<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>인구 기반 랜덤 나라 뽑기</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: rgba(255,255,255,0.07);
    --accent: #e8ff47;
    --accent2: #47ffe8;
    --text: #f0f0f0;
    --muted: #7a7a8c;
    --card-radius: 20px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glowing orb */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(232,255,71,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 700px;
    padding: 3rem 1.5rem 4rem;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header .label {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(232,255,71,0.3);
    padding: 4px 14px;
    border-radius: 100px;
    margin-bottom: 1rem;
    font-weight: 500;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 5.5rem);
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--text);
  }

  header h1 span {
    color: var(--accent);
  }

  header p {
    margin-top: 0.8rem;
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.6;
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 2rem;
  }

  .filter-btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 18px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.02em;
  }

  .filter-btn:hover {
    border-color: rgba(232,255,71,0.4);
    color: var(--text);
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0a0f;
    font-weight: 700;
  }

  /* Roll button */
  .roll-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 2rem;
  }

  .roll-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.12em;
    padding: 18px 60px;
    border-radius: 100px;
    border: none;
    background: var(--accent);
    color: #0a0a0f;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 40px rgba(232,255,71,0.25);
    position: relative;
    overflow: hidden;
  }

  .roll-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .roll-btn:hover {
    transform: scale(1.04);
    box-shadow: 0 0 60px rgba(232,255,71,0.4);
  }

  .roll-btn:active {
    transform: scale(0.97);
  }

  .roll-btn.spinning {
    pointer-events: none;
    opacity: 0.8;
  }

  /* Result card */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 2.5rem 2rem;
    text-align: center;
    margin-bottom: 2rem;
    min-height: 240px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: border-color 0.4s;
    position: relative;
    overflow: hidden;
  }

  .result-card.revealed {
    border-color: rgba(232,255,71,0.25);
  }

  .result-card .glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(232,255,71,0.05) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.5s;
  }

  .result-card.revealed .glow { opacity: 1; }

  .placeholder-text {
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
  }

  .result-flag {
    font-size: 80px;
    line-height: 1;
    margin-bottom: 16px;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .result-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.2rem, 7vw, 3.5rem);
    letter-spacing: 0.06em;
    color: var(--text);
    animation: slideUp 0.35s ease both;
  }

  .result-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 300;
    animation: slideUp 0.4s ease both;
  }

  .result-sub span {
    color: var(--accent2);
    font-weight: 500;
  }

  /* Probability bar */
  .prob-section {
    margin-top: 20px;
    width: 100%;
    max-width: 340px;
    animation: slideUp 0.45s ease both;
  }

  .prob-header {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 300;
  }

  .prob-header strong {
    color: var(--accent);
    font-weight: 700;
  }

  .prob-track {
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 100px;
    overflow: hidden;
  }

  .prob-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 100px;
    width: 0;
    transition: width 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 12px;
    text-align: center;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    font-weight: 300;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.04em;
    color: var(--accent);
  }

  /* History */
  .history-section {
    margin-top: 0;
  }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .history-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    font-weight: 500;
  }

  .clear-btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .clear-btn:hover {
    border-color: rgba(255,100,100,0.4);
    color: #ff6464;
  }

  .history-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 16px;
    animation: slideIn 0.25s ease both;
    font-size: 14px;
  }

  .history-item .h-flag { font-size: 22px; flex-shrink: 0; }
  .history-item .h-name { font-weight: 500; flex: 1; }
  .history-item .h-pop { font-size: 12px; color: var(--muted); font-weight: 300; }
  .history-item .h-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .empty-history {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 20px 0;
    font-weight: 300;
  }

  /* Lowest probability banner */
  .lucky-banner {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid rgba(71,255,232,0.25);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 10px;
    animation: slideIn 0.3s ease both;
    position: relative;
    overflow: hidden;
  }

  .lucky-banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at left center, rgba(71,255,232,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .lucky-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #0a0a0f;
    background: var(--accent2);
    padding: 3px 10px;
    border-radius: 100px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .lucky-flag { font-size: 26px; flex-shrink: 0; }
  .lucky-name { font-weight: 500; font-size: 15px; flex: 1; }
  .lucky-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    color: var(--accent2);
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  /* Spinner overlay */
  .spinner-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    animation: pulse 0.5s ease infinite alternate;
  }

  /* Animations */
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  @keyframes slideUp {
    from { transform: translateY(16px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  @keyframes slideIn {
    from { transform: translateX(-10px); opacity: 0; }
    to   { transform: translateX(0);     opacity: 1; }
  }

  @keyframes pulse {
    from { opacity: 0.3; }
    to   { opacity: 0.8; }
  }

  /* ── RARE EFFECT OVERLAY ── */
  #rareOverlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.92);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    touch-action: none;
  }
  #rareOverlay.show { display: flex; }
  .rare-particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .rare-particle {
    position: absolute;
    border-radius: 50%;
    animation: particleFly 1.4s ease-out both;
  }
  @keyframes particleFly {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }
  .rare-beams { position: absolute; inset: 0; pointer-events: none; }
  .rare-beam {
    position: absolute;
    left: 50%; top: 50%;
    width: 2px; height: 0;
    transform-origin: top center;
    opacity: 0;
    animation: beamShot 1.6s ease-out both;
  }
  @keyframes beamShot {
    0%   { opacity: 0; height: 0; }
    20%  { opacity: 0.9; }
    100% { opacity: 0; height: 55vh; }
  }
  .rare-ring {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%,-50%);
    border-radius: 50%;
    animation: rareRing 0.7s ease-out both;
    pointer-events: none;
  }
  @keyframes rareRing {
    0%   { width: 0; height: 0; opacity: 1; }
    100% { width: 320px; height: 320px; opacity: 0; }
  }
  .rare-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.8rem, 8vw, 3rem);
    letter-spacing: 0.2em;
    color: var(--accent);
    text-align: center;
    animation: rareLabelAnim 1.8s ease both;
    z-index: 1;
    text-shadow: 0 0 40px rgba(232,255,71,0.7);
  }
  @keyframes rareLabelAnim {
    0%   { opacity: 0; transform: scale(0.5) translateY(20px); }
    30%  { opacity: 1; transform: scale(1.1) translateY(0); }
    70%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; }
  }
  .rare-flag-big {
    font-size: clamp(5rem, 20vw, 8rem);
    animation: rareFlagAnim 1.8s ease both;
    z-index: 1;
    line-height: 1;
    margin-bottom: 12px;
  }
  @keyframes rareFlagAnim {
    0%   { opacity: 0; transform: scale(0.3) rotate(-10deg); }
    40%  { opacity: 1; transform: scale(1.15) rotate(3deg); }
    70%  { transform: scale(1) rotate(0); }
    100% { opacity: 0; }
  }
  .rare-rarity-tag {
    font-size: 12px;
    letter-spacing: 0.15em;
    font-weight: 700;
    padding: 4px 16px;
    border-radius: 100px;
    z-index: 1;
    animation: rareLabelAnim 1.8s ease both;
    animation-delay: 0.1s;
  }

  /* ── RESPONSIVE / MOBILE ── */
  @media (max-width: 600px) {
    .wrapper { padding: 1.5rem 1rem 3rem; }
    header h1 { font-size: clamp(2.4rem, 12vw, 4rem); }
    .stats-row { gap: 8px; }
    .stat-card { padding: 10px 6px; }
    .stat-value { font-size: 1.2rem; }
    .stat-label { font-size: 9px; }
    .roll-btn { padding: 14px 0; font-size: 1.3rem; width: 100%; }
    .filter-bar { gap: 5px; }
    .filter-btn { font-size: 11px; padding: 5px 10px; }
    .dex-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 7px; }
    .dex-card { padding: 10px 5px 8px; }
    .dex-flag { font-size: 26px; }
    .dex-name { font-size: 10px; }
    .tab-btn { padding: 7px 12px; font-size: 11px; }
    .history-item .h-pop { display: none; }
    .modal { padding: 1.5rem 1rem; }
    .modal-flag { font-size: 52px; }
    .modal-name { font-size: 1.8rem; }
    .dex-controls { gap: 6px; }
    .dex-search { font-size: 13px; }
  }

  /* ── TAB NAV ── */
  .tab-nav {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px;
    margin: 0 auto 2.5rem;
    width: fit-content;
    max-width: calc(100% - 2rem);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tab-nav::-webkit-scrollbar { display: none; }
  .tab-btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 100px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn.active {
    background: var(--accent);
    color: #0a0a0f;
    font-weight: 700;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── DEX FILTER TABS ── */
  .dex-filter-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .dex-ftab {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .dex-ftab.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #0a0a0f;
    font-weight: 700;
  }

  /* ── DEX ── */
  .dex-controls {
    display: flex;
    gap: 10px;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .dex-search {
    flex: 1;
    min-width: 160px;
    padding: 9px 14px;
    border-radius: var(--card-radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .dex-search:focus { border-color: rgba(232,255,71,0.4); }
  .dex-search::placeholder { color: var(--muted); }
  .dex-sort {
    padding: 9px 12px;
    border-radius: var(--card-radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }
  .dex-count {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .dex-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .dex-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 10px 12px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .dex-card:hover {
    border-color: rgba(232,255,71,0.35);
    transform: translateY(-2px);
  }
  .dex-card.seen { border-color: rgba(71,255,232,0.3); }
  .dex-card.seen::after {
    content: '✓';
    position: absolute;
    top: 6px; right: 8px;
    font-size: 10px;
    color: var(--accent2);
    font-weight: 700;
  }
  .dex-no {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 4px;
    font-weight: 300;
  }
  .dex-flag { font-size: 36px; line-height: 1; margin-bottom: 8px; }
  .dex-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .dex-pop {
    font-size: 11px;
    color: var(--muted);
    font-weight: 300;
  }
  .dex-region-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    border-radius: 100px;
    margin-top: 5px;
    text-transform: uppercase;
  }

  /* Modal */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid rgba(232,255,71,0.2);
    border-radius: var(--card-radius);
    padding: 2rem;
    max-width: 360px;
    width: 100%;
    text-align: center;
    position: relative;
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .modal-close {
    position: absolute;
    top: 12px; right: 14px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
  }
  .modal-flag { font-size: 72px; margin-bottom: 12px; }
  .modal-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .modal-continent { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .modal-table { width: 100%; font-size: 13px; text-align: left; }
  .modal-table tr td:first-child { color: var(--muted); padding: 5px 0; width: 50%; }
  .modal-table tr td:last-child { font-weight: 500; color: var(--text); }
  .modal-pct { color: var(--accent); }
  .modal-seen-badge {
    display: inline-block;
    margin-top: 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent2);
    border: 1px solid rgba(71,255,232,0.35);
    padding: 4px 14px;
    border-radius: 100px;
  }
  .dex-progress {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
  }
  .dex-progress-track {
    flex: 1;

<div class="wrapper">

  </div>

  <div class="roll-wrap">

  </div>

  <div class="result-card" id="resultCard">
    <div class="glow"></div>
    <p class="placeholder-text">버튼을 눌러 나라를 뽑아보세요 🌍</p>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">뽑기 횟수</div>

    </div>
    <div class="stat-card">

      <div class="stat-value" id="statCount">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">총 인구</div>
      <div class="stat-value" id="statPop">0억</div>
    </div>
  </div>

  <div class="history-section">
    <div id="luckyBanner" style="display:none;"></div>
    <div class="history-header">
      <span class="history-title">뽑기 기록</span>
      <button class="clear-btn" onclick="clearHistory()">초기화</button>
    </div>
    <ul class="history-list" id="historyList">
      <li class="empty-history">아직 뽑기 기록이 없습니다</li>

  </div>
  </div><!-- /tab-spin -->

  <!-- DEX TAB -->
  <div class="tab-panel" id="tab-dex">

      <span class="dex-progress-count" id="dexSeenCount">0</span>
      <div class="dex-progress-track">

    </div>
    <div class="dex-filter-tabs">
      <button class="dex-ftab active" data-dexfilter="all" onclick="setDexFilter(this,'all')">전체</button>
      <button class="dex-ftab" data-dexfilter="seen" onclick="setDexFilter(this,'seen')">수집됨</button>
      <button class="dex-ftab" data-dexfilter="unseen" onclick="setDexFilter(this,'unseen')">미수집</button>
    </div>
    <div class="dex-controls">
      <input class="dex-search" type="text" placeholder="나라 검색..." id="dexSearch" oninput="renderDex()" />
      <select class="dex-sort" id="dexSort" onchange="renderDex()">

        <option value="name">이름순</option>
        <option value="region">지역순</option>
      </select>
      <span class="dex-count" id="dexCount"></span>
    </div>
    <div class="dex-grid" id="dexGrid"></div>
  </div><!-- /tab-dex -->

</div>

<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal(event)">

  </div>
</div>

let seenSet = new Set();
let dexFilter = 'all';

function setDexFilter(el, val) {
  dexFilter = val;
  document.querySelectorAll('.dex-ftab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderDex();
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (el) el.classList.add('active');
  if (tab === 'dex') renderDex();
}

function renderDex() {
  const q = document.getElementById('dexSearch').value.toLowerCase();
  const sort = document.getElementById('dexSort').value;
  const total = countries.reduce((s,c)=>s+c.pop,0);

  let list = countries.filter(c => {
    if (!c.name.toLowerCase().includes(q)) return false;
    if (dexFilter === 'seen') return seenSet.has(c.name);
    if (dexFilter === 'unseen') return !seenSet.has(c.name);
    return true;
  });

  if (sort === 'pop-desc') list.sort((a,b) => b.pop - a.pop);
  else if (sort === 'pop-asc') list.sort((a,b) => a.pop - b.pop);
  else if (sort === 'name') list.sort((a,b) => a.name.localeCompare(b.name, 'ko'));
  else if (sort === 'region') list.sort((a,b) => a.region.localeCompare(b.region) || b.pop - a.pop);

  document.getElementById('dexCount').textContent = `${list.length}개국`;

  const seenCount = seenSet.size;
  document.getElementById('dexSeenCount').textContent = seenCount;
  document.getElementById('dexProgressLabel').textContent = `/ ${countries.length} 나라 수집`;
  document.getElementById('dexProgressFill').style.width = (seenCount / countries.length * 100) + '%';

  const grid = document.getElementById('dexGrid');

  if (dexFilter === 'seen' && list.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--muted);font-size:14px;">아직 뽑은 나라가 없어요.<br>뽑기 탭에서 나라를 수집해보세요!</div>`;
    return;
  }

  grid.innerHTML = list.map((c) => {
    const rc = regionColors[c.region] || {bg:'rgba(255,255,255,0.05)',color:'#aaa'};
    const seen = seenSet.has(c.name);
    const idx = countries.indexOf(c) + 1;
    const rar = getRarity(c.pop);
    const rarBorder = rar ? `border-color:${rar.color}33;` : '';
    const rarGlow   = rar ? `box-shadow:0 0 10px ${rar.color}22;` : '';
    return `<div class="dex-card${seen?' seen':''}" style="${rarBorder}${rarGlow}" onclick="openModal(${countries.indexOf(c)})">
      <div class="dex-no">#${String(idx).padStart(3,'0')}</div>
      <div class="dex-flag">${c.flag}</div>
      <div class="dex-name">${c.name}</div>
      <div class="dex-pop">${formatPop(c.pop)}</div>
      <div class="dex-region-badge" style="background:${rc.bg};color:${rc.color}">${regionLabel[c.region]}</div>
      ${rar ? `<div style="font-size:8px;letter-spacing:0.1em;color:${rar.color};margin-top:3px;font-weight:700;">${rar.label.replace(/[✦★◆◇]/g,'').trim()}</div>` : ''}
    </div>`;
  }).join('');
}

function openModal(idx) {
  const c = countries[idx];
  const total = countries.reduce((s,x)=>s+x.pop,0);
  const pct = (c.pop / total * 100).toFixed(4);
  const cap = capitals[c.name] || '—';
  const rc = regionColors[c.region] || {bg:'',color:'#aaa'};
  const seen = seenSet.has(c.name);

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-flag">${c.flag}</div>
    <div class="modal-name">${c.name}</div>
    <div class="modal-continent">${c.continent} · ${regionLabel[c.region]}</div>
    <table class="modal-table">
      <tr><td>수도</td><td>${cap}</td></tr>
      <tr><td>인구</td><td>${c.pop.toLocaleString()} 명</td></tr>
      <tr><td>뽑힐 확률</td><td class="modal-pct">${pct}%</td></tr>
      <tr><td>인구 순위</td><td>#${[...countries].sort((a,b)=>b.pop-a.pop).findIndex(x=>x.name===c.name)+1}</td></tr>
    </table>
    ${seen ? '<div class="modal-seen-badge">✓ 뽑기에서 수집됨</div>' : ''}
  `;
  document.getElementById('modalBackdrop').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalBackdrop'))
    document.getElementById('modalBackdrop').classList.remove('open');
}
function closeModalDirect() {
  document.getElementById('modalBackdrop').classList.remove('open');
}
let currentRegion = 'all';
let history = [];
let rollTotal = 0;

function getFiltered() {
  return currentRegion === 'all' ? countries : countries.filter(c => c.region === currentRegion);
}

function weightedRandom(list) {
  const total = list.reduce((s, c) => s + c.pop, 0);
  let r = Math.random() * total;
  for (const c of list) { r -= c.pop; if (r <= 0) return c; }
  return list[list.length - 1];
}

function formatPop(n) {
  if (n >= 1e8) return (n / 1e8).toFixed(1) + '억 명';
  if (n >= 1e4) return (n / 1e4).toFixed(0) + '만 명';
  return n.toLocaleString() + '명';
}

function updateStats() {
  const list = getFiltered();
  const total = list.reduce((s, c) => s + c.pop, 0);
  document.getElementById('statTotal').textContent = rollTotal;
  document.getElementById('statCount').textContent = list.length;
  document.getElementById('statPop').textContent = (total / 1e8).toFixed(0) + '억';
}

function getRarity(pop) {
  if (pop <= 100000)    return { label: '✦ LEGENDARY ✦', color: '#ff4f4f', glow: 'rgba(255,79,79,0.8)',    beamColor: '#ff4f4f' };
  if (pop <= 500000)    return { label: '✦ EPIC ✦',      color: '#ff9f2f', glow: 'rgba(255,159,47,0.8)',   beamColor: '#ff9f2f' };
  if (pop <= 2000000)   return { label: '★ RARE ★',      color: '#c47bff', glow: 'rgba(196,123,255,0.7)', beamColor: '#c47bff' };
  if (pop <= 10000000)  return { label: '◆ UNCOMMON ◆',  color: '#47ffe8', glow: 'rgba(71,255,232,0.7)',  beamColor: '#47ffe8' };
  if (pop <= 50000000)  return { label: '◇ SPECIAL ◇',   color: '#6495ff', glow: 'rgba(100,149,255,0.6)', beamColor: '#6495ff' };
  return null;
}

function showRareEffect(c, onDone) {
  const rarity = getRarity(c.pop);
  if (!rarity) { onDone(); return; }

  const overlay = document.getElementById('rareOverlay');
  const flagEl  = document.getElementById('rareFlagBig');
  const labelEl = document.getElementById('rareLabel');
  const tagEl   = document.getElementById('rareTag');
  const beamsEl = document.getElementById('rareBeams');
  const partsEl = document.getElementById('rareParticles');

  flagEl.textContent  = c.flag;
  labelEl.textContent = c.name;
  tagEl.textContent   = '✦ ' + rarity.label + ' ✦';
  tagEl.style.cssText += `color:${rarity.color};border:1px solid ${rarity.color};background:rgba(0,0,0,0.5);`;
  labelEl.style.color = rarity.color;
  labelEl.style.textShadow = `0 0 40px ${rarity.glow}`;

  // beams
  beamsEl.innerHTML = '';
  const beamCount = 12;
  for (let i = 0; i < beamCount; i++) {
    const b = document.createElement('div');
    b.className = 'rare-beam';
    b.style.cssText = `transform:rotate(${i*(360/beamCount)}deg);background:${rarity.beamColor};animation-delay:${i*0.04}s;`;
    beamsEl.appendChild(b);
  }

  // ring
  const ring = document.createElement('div');
  ring.className = 'rare-ring';
  ring.style.border = `2px solid ${rarity.color}`;
  beamsEl.appendChild(ring);

  // particles
  partsEl.innerHTML = '';
  const colors = [rarity.color, '#fff', '#47ffe8', '#e8ff47'];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'rare-particle';
    const size = 4 + Math.random() * 8;
    const angle = Math.random() * 360;
    const dist  = 80 + Math.random() * 200;
    const tx = Math.cos(angle * Math.PI/180) * dist + 'px';
    const ty = Math.sin(angle * Math.PI/180) * dist + 'px';
    p.style.cssText = `width:${size}px;height:${size}px;left:50%;top:50%;background:${colors[i%colors.length]};--tx:${tx};--ty:${ty};animation-delay:${Math.random()*0.3}s;`;
    partsEl.appendChild(p);
  }

  overlay.classList.add('show');
  setTimeout(() => {
    overlay.classList.remove('show');
    beamsEl.innerHTML = '';
    partsEl.innerHTML = '';
    onDone();
  }, 1800);
}

function rollCountry() {
  const list = getFiltered();
  if (!list.length) return;

  const btn  = document.getElementById('rollBtn');
  const card = document.getElementById('resultCard');

  btn.classList.add('spinning');
  btn.textContent = '...';

  card.classList.remove('revealed');
  card.innerHTML = '<div class="glow"></div><div class="spinner-text">뽑는 중...</div>';

  setTimeout(() => {
    const c = weightedRandom(list);
    const total = list.reduce((s, x) => s + x.pop, 0);
    const pct = (c.pop / total * 100).toFixed(2);
    const barWidth = Math.min(parseFloat(pct) * 3, 100);

    function revealResult() {
      card.classList.add('revealed');
      card.innerHTML = `
        <div class="glow"></div>
        <div class="result-flag">${c.flag}</div>
        <div class="result-name">${c.name}</div>
        <div class="result-sub">${c.continent} &nbsp;·&nbsp; 인구 <span>${formatPop(c.pop)}</span></div>
        <div class="prob-section">
          <div class="prob-header">
            <span>뽑힐 확률</span>
            <strong>${pct}%</strong>
          </div>
          <div class="prob-track">
            <div class="prob-fill" id="probFill" style="width:0%"></div>
          </div>
        </div>
      `;
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const pf = document.getElementById('probFill');
          if (pf) pf.style.width = barWidth + '%';
        });
      });
      rollTotal++;
      history.unshift({ flag: c.flag, name: c.name, pop: c.pop, pct });
      if (history.length > 10) history.pop();
      seenSet.add(c.name);
      renderHistory();
      updateStats();
      btn.classList.remove('spinning');
      btn.textContent = 'SPIN !';
    }

    showRareEffect(c, revealResult);
  }, 400);
}

function renderLucky() {
  const banner = document.getElementById('luckyBanner');
  if (!history.length) { banner.style.display = 'none'; return; }
  const lucky = history.reduce((a, b) => parseFloat(a.pct) < parseFloat(b.pct) ? a : b);
  banner.style.display = 'block';
  banner.innerHTML = `
    <div class="lucky-banner">
      <span class="lucky-tag">최저 확률</span>
      <span class="lucky-flag">${lucky.flag}</span>
      <span class="lucky-name">${lucky.name}</span>
      <span class="lucky-pct">${lucky.pct}%</span>
    </div>
  `;
}

function renderHistory() {
  const ul = document.getElementById('historyList');
  if (!history.length) {
    ul.innerHTML = '<li class="empty-history">아직 뽑기 기록이 없습니다</li>';
    renderLucky();
    return;
  }
  ul.innerHTML = history.map((h, i) => `
    <li class="history-item" style="animation-delay:${i * 0.04}s">
      <span class="h-flag">${h.flag}</span>
      <span class="h-name">${h.name}</span>
      <span class="h-pop">${formatPop(h.pop)}</span>
      <span class="h-pct">${h.pct}%</span>
    </li>
  `).join('');
  renderLucky();
}

function clearHistory() {
  history = [];
  rollTotal = 0;
  renderHistory();
  renderLucky();
  updateStats();
  const card = document.getElementById('resultCard');
  card.classList.remove('revealed');
  card.innerHTML = '<div class="glow"></div><p class="placeholder-text">버튼을 눌러 나라를 뽑아보세요 🌍</p>';
}

// Filter buttons
document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentRegion = btn.dataset.region;
  updateStats();
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.target.matches('button')) {
    e.preventDefault();
    rollCountry();
  }
});

updateStats();
</script>
